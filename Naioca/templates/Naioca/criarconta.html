{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="{% static 'Naioca/css/style.css' %}"></head>
<body class="criarconta">

<div class="container">

    <h1>Criar Conta</h1>

    <form method="POST">

    
            {% csrf_token %}

        <label>Nome</label>
        <input type="text" name="nome" required>

        <label>E-mail</label>
        <input type="email" name="email" required>

        <label>Senha</label>
        <input type="password" name="senha" required>

        <button type="submit">
        Criar Conta
        </button>

    </form>

    <p>Já possui conta?</p>

    <a href="{% url 'Naioca:login' %}">
     Entrar</a>
        

</div>

<script src="cadastro.js"></script>

</body>
</html>
